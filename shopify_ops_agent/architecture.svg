<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#f8f9fb" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Shopify Dropshipping Ops Agent — Architecture</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#666">Multi-Agent Hierarchical Pipeline</text>

  <!-- ── Manager Agent (top centre) ── -->
  <rect x="310" y="80" width="280" height="64" rx="10" fill="#1a1a2e" stroke="#4a90d9" stroke-width="2"/>
  <text x="450" y="107" text-anchor="middle" font-size="13" font-weight="bold" fill="white">① Manager Agent</text>
  <text x="450" y="126" text-anchor="middle" font-size="11" fill="#a0c4ff">Orchestrates pipeline · tracks state · saves outputs</text>

  <!-- ── Input Data box ── -->
  <rect x="30" y="80" width="200" height="64" rx="8" fill="#fff" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="130" y="105" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">Input Data</text>
  <text x="130" y="122" text-anchor="middle" font-size="11" fill="#666">supplier_catalog.csv</text>
  <text x="130" y="137" text-anchor="middle" font-size="11" fill="#666">orders.csv</text>
  <!-- Arrow: Input → Manager -->
  <line x1="230" y1="112" x2="308" y2="112" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Output box ── -->
  <rect x="670" y="80" width="200" height="64" rx="8" fill="#fff" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="770" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#444">Outputs (out/)</text>
  <text x="770" y="119" text-anchor="middle" font-size="10" fill="#666">selection.json · listings.json</text>
  <text x="770" y="133" text-anchor="middle" font-size="10" fill="#666">price_update.csv · stock_update.csv</text>
  <text x="770" y="147" text-anchor="middle" font-size="10" fill="#666">order_actions.json · daily_report.md</text>
  <!-- Arrow: Manager → Output -->
  <line x1="592" y1="112" x2="668" y2="112" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Vertical arrow from Manager down -->
  <line x1="450" y1="144" x2="450" y2="178" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrblue)"/>

  <!-- ── Row 1: Agents 2-4 ── -->
  <!-- Agent 2: Product Sourcing -->
  <rect x="50" y="180" width="220" height="80" rx="9" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="160" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">② Product Sourcing Agent</text>
  <rect x="65" y="212" width="98" height="18" rx="4" fill="#d4edda"/>
  <text x="114" y="225" text-anchor="middle" font-size="10" fill="#155724">Deterministic</text>
  <text x="160" y="248" text-anchor="middle" font-size="10" fill="#555">Picks top 10 SKUs</text>
  <text x="160" y="261" text-anchor="middle" font-size="10" fill="#555">stock ≥ 10 · margin ≥ 25%</text>
  <!-- output label -->
  <text x="160" y="276" text-anchor="middle" font-size="9" fill="#888">→ selection.json</text>

  <!-- Agent 3: Listing -->
  <rect x="340" y="180" width="220" height="80" rx="9" fill="#fff3cd" stroke="#f0a500" stroke-width="1.5"/>
  <text x="450" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">③ Listing Agent</text>
  <rect x="355" y="212" width="80" height="18" rx="4" fill="#cce5ff"/>
  <text x="395" y="225" text-anchor="middle" font-size="10" fill="#004085">LLM — Claude</text>
  <text x="450" y="248" text-anchor="middle" font-size="10" fill="#555">Titles · bullets</text>
  <text x="450" y="261" text-anchor="middle" font-size="10" fill="#555">descriptions · tags · SEO</text>
  <text x="450" y="276" text-anchor="middle" font-size="9" fill="#888">→ listings.json</text>

  <!-- Agent 4: Pricing -->
  <rect x="630" y="180" width="220" height="80" rx="9" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="740" y="204" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">④ Pricing &amp; Stock Agent</text>
  <rect x="645" y="212" width="98" height="18" rx="4" fill="#d4edda"/>
  <text x="694" y="225" text-anchor="middle" font-size="10" fill="#155724">Deterministic</text>
  <text x="740" y="248" text-anchor="middle" font-size="10" fill="#555">Formula pricing · ≥25% margin</text>
  <text x="740" y="261" text-anchor="middle" font-size="10" fill="#555">AU/non-AU · round $0.50</text>
  <text x="740" y="276" text-anchor="middle" font-size="9" fill="#888">→ price_update.csv · stock_update.csv</text>

  <!-- Arrows from row1 down -->
  <line x1="160" y1="260" x2="160" y2="356" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrblue)" stroke-dasharray="4,2"/>
  <line x1="450" y1="260" x2="450" y2="356" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrblue)" stroke-dasharray="4,2"/>
  <line x1="740" y1="260" x2="740" y2="356" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrblue)" stroke-dasharray="4,2"/>

  <!-- ── Row 2: Agents 5-6 ── -->
  <!-- Agent 5: Order Routing -->
  <rect x="50" y="358" width="220" height="80" rx="9" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="160" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">⑤ Order Routing Agent</text>
  <rect x="65" y="390" width="98" height="18" rx="4" fill="#d4edda"/>
  <text x="114" y="403" text-anchor="middle" font-size="10" fill="#155724">Deterministic</text>
  <text x="160" y="424" text-anchor="middle" font-size="10" fill="#555">FULFIL · BACKORDER · SUBSTITUTE</text>
  <text x="160" y="437" text-anchor="middle" font-size="10" fill="#555">Generates customer emails</text>
  <text x="160" y="452" text-anchor="middle" font-size="9" fill="#888">→ order_actions.json</text>

  <!-- Agent 6: QA -->
  <rect x="340" y="358" width="220" height="80" rx="9" fill="#fff3cd" stroke="#f0a500" stroke-width="1.5"/>
  <text x="450" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">⑥ QA Agent</text>
  <rect x="355" y="390" width="80" height="18" rx="4" fill="#f8d7da"/>
  <text x="395" y="403" text-anchor="middle" font-size="10" fill="#721c24">LLM — Gemini</text>
  <text x="450" y="424" text-anchor="middle" font-size="10" fill="#555">Spots over-claims · spec mismatches</text>
  <text x="450" y="437" text-anchor="middle" font-size="10" fill="#555">Verdicts: PASS · WARN · FAIL</text>
  <text x="450" y="452" text-anchor="middle" font-size="9" fill="#888">→ listing_redlines.json</text>

  <!-- Arrows from row 2 down -->
  <line x1="160" y1="438" x2="350" y2="518" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrblue)" stroke-dasharray="4,2"/>
  <line x1="450" y1="438" x2="450" y2="518" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrblue)" stroke-dasharray="4,2"/>
  <line x1="740" y1="438" x2="560" y2="518" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrblue)" stroke-dasharray="4,2"/>

  <!-- Agent 7: Reporter -->
  <rect x="280" y="520" width="340" height="64" rx="9" fill="#e9d8fd" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="547" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1a2e">⑦ Reporter Agent</text>
  <rect x="295" y="556" width="98" height="18" rx="4" fill="#d4edda"/>
  <text x="344" y="569" text-anchor="middle" font-size="10" fill="#155724">Deterministic</text>
  <text x="510" y="569" text-anchor="middle" font-size="10" fill="#555">→ daily_report.md</text>

  <!-- ── LLM Provider Box ── -->
  <rect x="30" y="490" width="200" height="90" rx="8" fill="#fff" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="510" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">LLM Provider Layer</text>
  <rect x="45" y="520" width="75" height="18" rx="4" fill="#cce5ff"/>
  <text x="82" y="533" text-anchor="middle" font-size="10" fill="#004085">Claude (Listing)</text>
  <rect x="130" y="520" width="85" height="18" rx="4" fill="#f8d7da"/>
  <text x="172" y="533" text-anchor="middle" font-size="10" fill="#721c24">Gemini (QA)</text>
  <rect x="45" y="545" width="60" height="18" rx="4" fill="#d4edda"/>
  <text x="75" y="558" text-anchor="middle" font-size="10" fill="#155724">Ollama ($0)</text>
  <rect x="115" y="545" width="100" height="18" rx="4" fill="#f5f5f5"/>
  <text x="165" y="558" text-anchor="middle" font-size="10" fill="#555">Mock (offline)</text>
  <text x="130" y="575" text-anchor="middle" font-size="9" fill="#888">Auto-fallback chain</text>

  <!-- ── Arrow markers ── -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#999"/>
    </marker>
    <marker id="arrblue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="630" y="390" width="220" height="120" rx="8" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="740" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">Legend</text>
  <rect x="645" y="420" width="14" height="14" rx="3" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="668" y="432" font-size="10" fill="#444">Deterministic Agent</text>
  <rect x="645" y="443" width="14" height="14" rx="3" fill="#fff3cd" stroke="#f0a500" stroke-width="1.5"/>
  <text x="668" y="455" font-size="10" fill="#444">LLM-powered Agent</text>
  <rect x="645" y="466" width="14" height="14" rx="3" fill="#e9d8fd" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="668" y="478" font-size="10" fill="#444">Final Aggregator</text>
  <line x1="645" y1="495" x2="659" y2="495" stroke="#4a90d9" stroke-width="2"/>
  <text x="668" y="499" font-size="10" fill="#444">Data flow</text>
  <line x1="645" y1="510" x2="659" y2="510" stroke="#999" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="668" y="514" font-size="10" fill="#444">External / reference</text>
</svg>
